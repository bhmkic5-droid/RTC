<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>🛠️ SupportDesk</h1>
            <div class="nav-actions">
                <button class="btn-primary" onclick="openAddModal()">+ New Complaint</button>
                <button class="btn-secondary" onclick="exportAllData()">📤 Export All</button>
                <button class="btn-secondary" onclick="importData()">📥 Import</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total</span>
                <span id="totalCount" class="stat-value">0</span>
            </div>
            <div class="stat-card pending">
                <span class="stat-label">Pending</span>
                <span id="pendingCount" class="stat-value">0</span>
            </div>
            <div class="stat-card progress">
                <span class="stat-label">In Progress</span>
                <span id="progressCount" class="stat-value">0</span>
            </div>
            <div class="stat-card resolved">
                <span class="stat-label">Resolved</span>
                <span id="resolvedCount" class="stat-value">0</span>
            </div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search ID, customer, or serial...">
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="in-progress">In Progress</option>
                <option value="resolved">Resolved</option>
            </select>
            <select id="productFilter">
                <option value="all">All Products</option>
            </select>
            <button class="btn-danger" onclick="clearAllData()">Clear All</button>
        </div>

        <div id="complaintsGrid" class="complaints-grid"></div>
    </main>

    <div id="complaintModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Register New Complaint</h2>
            <form id="complaintForm" onsubmit="event.preventDefault(); saveComplaint();">
                <input type="hidden" id="complaintId">
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="customerPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="customerEmail">
                    </div>
                </div>
                <div class="form-group">
			<label>Product Type *</label>
			<select id="productType" required>
        <option value="">Select Product</option>
        <option value="ATM">ATM</option>
        <option value="MIB-11">MIB-11</option>
        <option value="TOKEN MACHINE">Floor Stand(QMS)</option>
        <option value="POS Machine">POS Machine</option>
        <option value="NCM">Note Counting Machine</option>
        <option value="Cheque Deposit KIOSK(CDK)">Cheque Deposit KIOSK(CDK)</option>
        <option value="XRF">XRF</option>
        <option value="IR TECH">IR TECH</option>
        <option value="I-HOME">I-HOME</option>
        <option value="DIGITAL SIGNAGE(DS)">DIGITAL SIGNAGE(DS)</option>
        <option value="WhiteBoard">SIB</option>
		<option value="Other">Other</option>
    </select>
</div>
                    <div class="form-group">
                        <label>Serial Number *</label>
                        <input type="text" id="serialNumber" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Complaint</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content wide">
            <span class="close-btn" onclick="closeDetailModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
